<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Email Preview — DMM Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Roboto+Slab:wght@100;300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-primary: #1c1c1c;
            --color-dark: #1c1c1c;
            --color-darker: #141414;
            --color-white: #fff;
            --color-muted: #53575a;
            --color-border: #e5e5e5;
            --color-navy: #10293c;
            --color-gold: #b97000;
            --font-heading: 'Montserrat', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --font-body: 'Roboto Slab', 'Helvetica Neue', Helvetica, Arial, sans-serif;
            --radius: 4px;
            --transition: 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-body);
            background: #f0f0f0;
            color: var(--color-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ---- Top Bar ---- */
        .preview-topbar {
            background: var(--color-dark);
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 56px;
            flex-shrink: 0;
            gap: 16px;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 16px;
            min-width: 0;
            flex: 1;
        }

        .back-link {
            font-family: var(--font-heading);
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: color var(--transition);
            flex-shrink: 0;
        }

        .back-link:hover { color: var(--color-white); }

        .topbar-divider {
            width: 1px;
            height: 24px;
            background: rgba(255,255,255,0.15);
            flex-shrink: 0;
        }

        .topbar-info {
            min-width: 0;
            flex: 1;
        }

        .topbar-id {
            font-family: var(--font-heading);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.4);
        }

        .topbar-title {
            font-family: var(--font-heading);
            font-size: 13px;
            font-weight: 700;
            color: var(--color-white);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        /* ---- Device Toggle ---- */
        .device-toggle {
            display: flex;
            background: rgba(255,255,255,0.08);
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .device-btn {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            padding: 8px 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: var(--font-heading);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: background var(--transition), color var(--transition);
        }

        .device-btn:hover {
            color: rgba(255,255,255,0.7);
            background: rgba(255,255,255,0.05);
        }

        .device-btn.active {
            background: rgba(255,255,255,0.15);
            color: var(--color-white);
        }

        .device-btn svg { flex-shrink: 0; }

        /* ---- Action Buttons ---- */
        .action-btn {
            font-family: var(--font-heading);
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 8px 16px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background var(--transition), color var(--transition), border-color var(--transition);
        }

        .btn-copy {
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.15);
            color: rgba(255,255,255,0.7);
        }

        .btn-copy:hover {
            background: rgba(255,255,255,0.18);
            color: var(--color-white);
            border-color: rgba(255,255,255,0.3);
        }

        .btn-copy.copied {
            background: rgba(46,125,50,0.2);
            border-color: rgba(46,125,50,0.4);
            color: #66bb6a;
        }

        .btn-open {
            background: var(--color-white);
            border: 1px solid var(--color-white);
            color: var(--color-dark);
            text-decoration: none;
        }

        .btn-open:hover {
            background: rgba(255,255,255,0.85);
        }

        /* ---- Preview Area ---- */
        .preview-area {
            flex: 1;
            display: flex;
            align-items: stretch;
            justify-content: center;
            padding: 24px;
            overflow: hidden;
            background: #e8e8e8;
            background-image:
                radial-gradient(circle, #d5d5d5 1px, transparent 1px);
            background-size: 20px 20px;
        }

        .preview-frame-wrapper {
            background: var(--color-white);
            border-radius: 12px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            transition: width var(--transition), max-width var(--transition);
            display: flex;
            flex-direction: column;
            position: relative;
            height: 100%;
        }

        /* Device chrome bar */
        .device-chrome {
            background: #f8f8f8;
            border-bottom: 1px solid var(--color-border);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .chrome-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #e0e0e0;
        }

        .chrome-dot.red { background: #ff5f57; }
        .chrome-dot.yellow { background: #ffbd2e; }
        .chrome-dot.green { background: #28c840; }

        .chrome-url {
            flex: 1;
            font-family: var(--font-body);
            font-size: 11px;
            color: var(--color-muted);
            background: var(--color-white);
            padding: 5px 12px;
            border-radius: 4px;
            border: 1px solid var(--color-border);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-left: 8px;
        }

        .preview-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: var(--color-white);
            flex: 1;
            min-height: 0;
        }

        /* Device sizes */
        .preview-frame-wrapper[data-device="mobile"] {
            width: 375px;
            max-width: 375px;
        }

        .preview-frame-wrapper[data-device="tablet"] {
            width: 768px;
            max-width: 768px;
        }

        .preview-frame-wrapper[data-device="desktop"] {
            width: 1200px;
            max-width: 100%;
        }

        /* Device label */
        .device-label {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-heading);
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-muted);
            white-space: nowrap;
        }

        /* ---- Toast ---- */
        .toast {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(80px);
            font-family: var(--font-heading);
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--color-white);
            background: var(--color-dark);
            padding: 14px 28px;
            border-radius: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            pointer-events: none;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ---- Loading State ---- */
        .preview-loading {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 400px;
            font-family: var(--font-heading);
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--color-muted);
        }

        /* ---- Error State ---- */
        .preview-error {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            min-height: 400px;
            padding: 40px;
            text-align: center;
        }

        .preview-error svg {
            color: var(--color-muted);
            opacity: 0.3;
            margin-bottom: 16px;
        }

        .preview-error p {
            font-size: 14px;
            color: var(--color-muted);
        }

        /* ---- Responsive ---- */
        @media (max-width: 768px) {
            .preview-topbar {
                flex-wrap: wrap;
                height: auto;
                padding: 12px 16px;
                gap: 10px;
            }

            .topbar-left { width: 100%; }

            .topbar-right {
                width: 100%;
                justify-content: space-between;
            }

            .preview-area { padding: 16px; }

            .preview-frame-wrapper[data-device="mobile"],
            .preview-frame-wrapper[data-device="tablet"],
            .preview-frame-wrapper[data-device="desktop"] {
                width: 100%;
                max-width: 100%;
            }

            .device-btn span { display: none; }
        }
    </style>
</head>
<body>

    <!-- Top Bar -->
    <div class="preview-topbar">
        <div class="topbar-left">
            <a href="index.html" class="back-link" onclick="if(history.length>1){event.preventDefault();history.back()}">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5"/><path d="M12 19l-7-7 7-7"/></svg>
                Back
            </a>
            <div class="topbar-divider"></div>
            <div class="topbar-info">
                <div class="topbar-id" id="previewId"></div>
                <div class="topbar-title" id="previewTitle"></div>
            </div>
        </div>
        <div class="topbar-right">
            <div class="device-toggle">
                <button class="device-btn" data-device="mobile" onclick="switchDevice('mobile')" title="Mobile (375px)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="2" width="14" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
                    <span>Mobile</span>
                </button>
                <button class="device-btn" data-device="tablet" onclick="switchDevice('tablet')" title="Tablet (768px)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="2" width="16" height="20" rx="2" ry="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg>
                    <span>Tablet</span>
                </button>
                <button class="device-btn active" data-device="desktop" onclick="switchDevice('desktop')" title="Desktop (1200px)">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                    <span>Desktop</span>
                </button>
            </div>
            <button class="action-btn btn-copy" id="copyBtn" onclick="copyHtml()" title="Copy email HTML source">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
                <span>Copy HTML</span>
            </button>
            <a class="action-btn btn-open" id="openBtn" href="#" target="_blank" rel="noopener" title="Open in new tab">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
                <span>Open</span>
            </a>
        </div>
    </div>

    <!-- Preview Area -->
    <div class="preview-area">
        <div class="preview-frame-wrapper" id="frameWrapper" data-device="desktop">
            <div class="device-chrome">
                <div class="chrome-dot red"></div>
                <div class="chrome-dot yellow"></div>
                <div class="chrome-dot green"></div>
                <div class="chrome-url" id="chromeUrl"></div>
            </div>
            <iframe id="previewIframe" class="preview-iframe" sandbox="allow-same-origin"></iframe>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        const DEVICE_SIZES = {
            mobile: { width: 375, label: "Mobile — 375px" },
            tablet: { width: 768, label: "Tablet — 768px" },
            desktop: { width: 1200, label: "Desktop — 1200px" }
        };

        let currentDevice = "desktop";
        let previewUrl = "";
        let emailHtml = null;

        function getParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                url: params.get("url") || "",
                id: params.get("id") || "",
                name: params.get("name") || ""
            };
        }

        function init() {
            const { url, id, name } = getParams();
            previewUrl = url;

            document.getElementById("previewId").textContent = id;
            document.getElementById("previewTitle").textContent = name || "Email Preview";
            document.title = (id ? id + " — " : "") + "Email Preview";

            document.getElementById("openBtn").href = url;
            document.getElementById("chromeUrl").textContent = url;

            if (!url) {
                showError("No preview URL provided.");
                return;
            }

            // Fetch HTML and inject via srcdoc for same-origin access
            fetchAndRender(url);
        }

        async function fetchAndRender(url) {
            const iframe = document.getElementById("previewIframe");

            try {
                const resp = await fetch("/.netlify/functions/fetch-html?url=" + encodeURIComponent(url));
                if (!resp.ok) throw new Error("Failed to fetch");
                const data = await resp.json();
                emailHtml = data.html || null;

                if (emailHtml) {
                    iframe.srcdoc = emailHtml;
                } else {
                    iframe.src = url;
                }
            } catch (e) {
                console.warn("Fetch failed, loading URL directly:", e);
                emailHtml = null;
                iframe.src = url;
            }
        }

        function switchDevice(device) {
            currentDevice = device;
            const wrapper = document.getElementById("frameWrapper");
            wrapper.setAttribute("data-device", device);

            // Update toggle buttons
            document.querySelectorAll(".device-btn").forEach(btn => {
                btn.classList.toggle("active", btn.getAttribute("data-device") === device);
            });

        }

        async function copyHtml() {
            const btn = document.getElementById("copyBtn");

            if (!emailHtml) {
                showToast("HTML source not available");
                return;
            }

            try {
                await navigator.clipboard.writeText(emailHtml);
                btn.classList.add("copied");
                btn.querySelector("span").textContent = "Copied!";
                showToast("HTML copied to clipboard");

                setTimeout(() => {
                    btn.classList.remove("copied");
                    btn.querySelector("span").textContent = "Copy HTML";
                }, 2000);
            } catch (e) {
                showToast("Failed to copy — try again");
            }
        }

        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.textContent = message;
            toast.classList.add("show");
            setTimeout(() => toast.classList.remove("show"), 2500);
        }

        function showError(message) {
            const area = document.querySelector(".preview-area");
            area.innerHTML = `
                <div class="preview-error">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>
                    <p>${message}</p>
                </div>`;
        }

        // Keyboard shortcuts
        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") history.back();
            if ((e.ctrlKey || e.metaKey) && e.key === "c" && !window.getSelection().toString()) {
                e.preventDefault();
                copyHtml();
            }
            if (e.key === "1") switchDevice("mobile");
            if (e.key === "2") switchDevice("tablet");
            if (e.key === "3") switchDevice("desktop");
        });

        init();
    </script>
</body>
</html>
