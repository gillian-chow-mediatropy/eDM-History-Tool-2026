<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Marriott DMM Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=DM+Serif+Display&family=Roboto+Slab:wght@100;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Password Gate -->
    <div id="passwordGate">
        <div class="gate-card">
            <img src="https://cache.marriott.com/Images/Mobile/MC_Logos/MarriottApple57x57.png" alt="Marriott" class="gate-logo">
            <h2 class="gate-title">DMM Archive</h2>
            <p class="gate-subtitle">Enter password to continue</p>
            <form onsubmit="return checkPassword()" class="gate-form">
                <input type="password" id="gatePassword" class="gate-input" placeholder="Password" autocomplete="off">
                <button type="submit" class="gate-btn">Enter</button>
            </form>
            <p class="gate-error hidden" id="gateError">Incorrect password. Please try again.</p>
        </div>
    </div>

    <!-- Site Content (hidden until authenticated) -->
    <div id="siteContent" class="hidden">

    <!-- Navigation -->
    <nav id="navbar" class="nav-hidden">
        <div class="nav-container">
            <a href="#" class="nav-brand" onclick="showLanding()">
                <img src="https://cache.marriott.com/Images/Mobile/MC_Logos/MarriottApple57x57.png" alt="Marriott" class="nav-logo">
                <span class="nav-brand-text">DMM Archive</span>
            </a>
            <div class="nav-actions">
                <a class="nav-action-btn nav-action-link" href="admin/" title="Open admin panel">
                    Admin
                </a>
                <a class="nav-action-btn nav-action-link" href="builder/" title="Open template builder MVP">
                    Builder
                </a>
                <a class="nav-action-btn nav-action-link" href="dashboard/" title="Open progress dashboard">
                    Dashboard
                </a>
                <button class="nav-action-btn" onclick="forceRefreshData()" title="Sync data from Smartsheet">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 0 1-9 9m9-9a9 9 0 0 0-9-9m9 9h3m-12 9a9 9 0 0 1-9-9m9 9v3M3 12a9 9 0 0 1 9-9m-9 9H0m12-9V0"/></svg>
                </button>
                <button class="nav-action-btn" onclick="showLanding()" title="Back to home">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                </button>
                <button class="nav-action-btn" onclick="logout()" title="Logout">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                </button>
            </div>
        </div>
    </nav>

    <!-- Landing Page -->
    <header id="landing">
        <div class="hero-overlay"></div>
        <div class="landing-top-bar">
            <img src="https://cache.marriott.com/Images/Mobile/MC_Logos/MarriottApple57x57.png" alt="Marriott" class="hero-logo">
        </div>
        <div class="hero-content">
            <p class="hero-subtitle">Marriott</p>
            <h1 class="hero-title">DMM Archive</h1>
            <a href="#" class="btn-primary" onclick="loadYear(2026)">Enter Portal</a>
        </div>
    </header>

    <!-- Year View -->
    <main id="yearView" class="hidden">

        <!-- Filter Header -->
        <div class="filter-header">
            <div class="container">

                <!-- Row 1: Search + Dropdowns -->
                <div class="filter-row">
                    <div class="search-box">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" id="searchInput" placeholder="Search campaigns..." oninput="applyFilters()">
                        <button class="search-clear hidden" id="searchClear" onclick="clearSearch()" aria-label="Clear search">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
                        </button>
                    </div>
                    <div class="filter-selects">
                        <select id="yearFilter" onchange="onYearFilterChange()">
                            <option value="2026">2026</option>
                        </select>
                        <select id="areaFilter" onchange="applyFilters()">
                            <option value="all">All Areas</option>
                        </select>
                        <select id="marketFilter" onchange="applyFilters()">
                            <option value="all">All Markets</option>
                        </select>
                        <button class="filter-reset-btn" onclick="resetFilters()" title="Reset all filters">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                        </button>
                    </div>
                </div>

                <!-- Row 2: Month Pills -->
                <div class="month-pills" id="monthPills">
                    <button class="month-pill active" data-month="all" onclick="selectMonth('all')">All</button>
                    <button class="month-pill" data-month="January" onclick="selectMonth('January')">Jan</button>
                    <button class="month-pill" data-month="February" onclick="selectMonth('February')">Feb</button>
                    <button class="month-pill" data-month="March" onclick="selectMonth('March')">Mar</button>
                    <button class="month-pill" data-month="April" onclick="selectMonth('April')">Apr</button>
                    <button class="month-pill" data-month="May" onclick="selectMonth('May')">May</button>
                    <button class="month-pill" data-month="June" onclick="selectMonth('June')">Jun</button>
                    <button class="month-pill" data-month="July" onclick="selectMonth('July')">Jul</button>
                    <button class="month-pill" data-month="August" onclick="selectMonth('August')">Aug</button>
                    <button class="month-pill" data-month="September" onclick="selectMonth('September')">Sep</button>
                    <button class="month-pill" data-month="October" onclick="selectMonth('October')">Oct</button>
                    <button class="month-pill" data-month="November" onclick="selectMonth('November')">Nov</button>
                    <button class="month-pill" data-month="December" onclick="selectMonth('December')">Dec</button>
                </div>

                <!-- Active Filters Summary -->
                <div class="filter-summary" id="filterSummary"></div>
            </div>
        </div>

        <!-- Results -->
        <div class="container">
            <div class="results-header" id="resultsHeader"></div>
            <div id="emailSections"></div>
            <div id="noResults" class="no-results hidden">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <p>No emails match your filters.</p>
                <button class="btn-reset btn-reset-large" onclick="resetFilters()">Clear All Filters</button>
            </div>
        </div>
    </main>

    <!-- Back to Top -->
    <button id="backToTop" class="back-to-top" onclick="scrollToTop()" aria-label="Back to top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <footer>
        <div class="container">
            <p>&copy; 2026 Marriott &middot; DMM Email Archive</p>
        </div>
    </footer>

    </div><!-- end siteContent -->

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
