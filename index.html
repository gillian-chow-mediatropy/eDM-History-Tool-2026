<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Marriott DMM Archive</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=DM+Serif+Display&family=Roboto+Slab:wght@100;300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <!-- Password Gate -->
    <div id="passwordGate">
        <div class="gate-card">
            <img src="https://cache.marriott.com/Images/Mobile/MC_Logos/MarriottApple57x57.png" alt="Marriott" class="gate-logo">
            <h2 class="gate-title">DMM Archive</h2>
            <p class="gate-subtitle">Enter password to continue</p>
            <form onsubmit="return checkPassword()" class="gate-form">
                <input type="password" id="gatePassword" class="gate-input" placeholder="Password" autocomplete="off">
                <button type="submit" class="gate-btn">Enter</button>
            </form>
            <p class="gate-error hidden" id="gateError">Incorrect password. Please try again.</p>
        </div>
    </div>

    <!-- Site Content (hidden until authenticated) -->
    <div id="siteContent" class="hidden">

    <!-- Navigation (hidden on landing, shown on year view) -->
    <nav id="navbar" class="nav-hidden">
        <div class="nav-container">
            <a href="#" class="nav-brand" onclick="showLanding()">
                <img src="https://cache.marriott.com/Images/Mobile/MC_Logos/MarriottApple57x57.png" alt="Marriott" class="nav-logo">
            </a>
            <button class="nav-toggle" onclick="toggleMobileMenu()" aria-label="Toggle menu">
                <span></span><span></span><span></span>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="#" onclick="loadYear(2030)" class="nav-link">2030</a></li>
                <li><a href="#" onclick="loadYear(2029)" class="nav-link">2029</a></li>
                <li><a href="#" onclick="loadYear(2028)" class="nav-link">2028</a></li>
                <li><a href="#" onclick="loadYear(2027)" class="nav-link">2027</a></li>
                <li><a href="#" onclick="loadYear(2026)" class="nav-link">2026</a></li>
            </ul>
        </div>
    </nav>

    <!-- Landing Page -->
    <header id="landing">
        <div class="hero-overlay"></div>
        <div class="landing-top-bar">
            <img src="https://cache.marriott.com/Images/Mobile/MC_Logos/MarriottApple57x57.png" alt="Marriott" class="hero-logo">
        </div>
        <div class="hero-content">
            <p class="hero-subtitle">Marriott</p>
            <h1 class="hero-title">DMM Archive</h1>
            <a href="#" class="btn-primary" onclick="loadYear(2026)">Enter Portal</a>
        </div>
    </header>

    <!-- Year View -->
    <main id="yearView" class="hidden">

        <!-- Filter Bar -->
        <div class="filter-bar">
            <div class="container">
                <div class="filter-bar-inner">

                    <!-- Search -->
                    <div class="search-box">
                        <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                        <input type="text" id="searchInput" placeholder="Search by subject line, body copy, or market..." oninput="applyFilters()">
                        <button class="search-clear hidden" id="searchClear" onclick="clearSearch()" aria-label="Clear search">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18"/><path d="M6 6l12 12"/></svg>
                        </button>
                    </div>

                    <!-- Dropdown Filters -->
                    <div class="filter-dropdowns">
                        <div class="filter-group">
                            <label for="yearFilter">Year</label>
                            <select id="yearFilter" onchange="onYearFilterChange()">
                                <option value="2030">2030</option>
                                <option value="2029">2029</option>
                                <option value="2028">2028</option>
                                <option value="2027">2027</option>
                                <option value="2026">2026</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="monthFilter">Month</label>
                            <select id="monthFilter" onchange="applyFilters()">
                                <option value="all">All Months</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label for="marketFilter">Market</label>
                            <select id="marketFilter" onchange="applyFilters()">
                                <option value="all">All Markets</option>
                            </select>
                        </div>
                        <button class="btn-reset" onclick="resetFilters()">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>
                            Reset
                        </button>
                    </div>
                </div>

                <!-- Active Filters Summary -->
                <div class="filter-summary" id="filterSummary"></div>
            </div>
        </div>

        <!-- Results -->
        <div class="container">
            <div class="results-header" id="resultsHeader"></div>
            <div id="emailSections"></div>
            <div id="noResults" class="no-results hidden">
                <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
                <p>No emails match your filters.</p>
                <button class="btn-reset btn-reset-large" onclick="resetFilters()">Clear All Filters</button>
            </div>
        </div>
    </main>

    <!-- Back to Top -->
    <button id="backToTop" class="back-to-top" onclick="scrollToTop()" aria-label="Back to top">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 15l-6-6-6 6"/></svg>
    </button>

    <footer>
        <div class="container">
            <p>&copy; 2026 Marriott &middot; DMM Email Archive</p>
        </div>
    </footer>

    </div><!-- end siteContent -->

    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
